name: irce
version: "0.1.0"
description: >
  IRCE (Intelligent RecoveryControl Environment) is a deterministic OpenEnv
  benchmark for budget-aware recovery decisions under ambiguous tool failures,
  rate-limit cooldowns, and reliability drift. Agents learn when to retry,
  modify, switch tools, replan, or escalate.

app: server.app:app
runtime: fastapi
port: 7860
inference: inference.py

tasks:
  - id: 1
    name: easy
    max_steps: 6
    description: >
      Clean recovery with transient and hard failures only.
      Generous budget (1.0), no noise, no rate limits.
  - id: 2
    name: medium
    max_steps: 6
    description: >
      Mixed failures with rate limits, ambiguous outcomes, and budget pressure.
      Budget 0.8, 12% observation noise, cooldown mechanics active.
  - id: 3
    name: hard
    max_steps: 7
    description: >
      Drifting reliability, noisy error labels, cascading penalties, and
      costly backup routing. Budget 0.6, 25% noise, drift enabled after step 2.

metadata:
  display_name: "Intelligent RecoveryControl Environment"
  package_name: "irce"
  package_dir: "src/irce"
  benchmark_focus: "failure-recovery under uncertainty"
  deterministic: true
  llm_ready: true
  author: "IRCE Team"
  license: "MIT"
